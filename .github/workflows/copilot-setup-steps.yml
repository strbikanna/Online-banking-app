name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: "Step 1: Checkout code"
        uses: actions/checkout@v6
      
      - name: "Step 2: Run MySQL Container"
        run: |
          docker run --name mysql \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE=onlinebanking2 \
            -p 3306:3306 \
            -d mysql:8.0

          for i in {1..30}; do
            if docker exec mysql mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            sleep 2
          done

          echo "MySQL did not become ready in time"
          docker logs mysql
          exit 1

      - name: "Step 3: Set up JDK 21"
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: "Step 4: Ensure Maven Wrapper is executable"
        run: chmod +x mvnw

      - name: "Step 5: Build jar with Maven"
        run: ./mvnw -B -DskipTests package --file pom.xml

      - name: "Step 6: Start Application in background"
        run: |
          nohup java -jar target/*.jar > app.log 2>&1 &

          for i in {1..60}; do
            if curl -sSf http://localhost:8080/ > /dev/null; then
              echo "Application is ready on http://localhost:8080"
              exit 0
            fi
            sleep 2
          done

          echo "Application did not become ready in time"
          tail -n 200 app.log || true
          exit 1