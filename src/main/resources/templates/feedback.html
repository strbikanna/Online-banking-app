<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml" lang="en">
<head th:replace="common/header :: common-header"/>
<body role="page-top" data-spy="scroll" data-target=".navbar-fixed-top">
<head th:replace="common/header :: navbar"/>
<div class="container main">
    <div class="row">
        <div class="col-lg-12">
            <h2 class="page-header">Submit Feedback</h2>
            <p class="text-muted">We value your opinion. Please share your thoughts to help us improve.</p>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">

            <div th:if="${successMessage}" class="alert alert-success" role="alert">
                <i class="fa fa-check-circle"></i>
                <span th:text="${successMessage}"></span>
            </div>

            <form th:action="@{/feedback/create}" th:object="${feedback}" method="post">

                <div class="form-group" th:classappend="${#fields.hasErrors('subject')} ? 'has-error'">
                    <label for="subject">Subject:</label>
                    <input type="text" class="form-control" id="subject" th:field="*{subject}"
                           placeholder="Brief subject of your feedback" maxlength="100"/>
                    <span class="help-block" th:if="${#fields.hasErrors('subject')}" th:errors="*{subject}"></span>
                </div>

                <div class="form-group" th:classappend="${#fields.hasErrors('rating')} ? 'has-error'">
                    <label for="rating">Rating:</label>
                    <select class="form-control" id="rating" th:field="*{rating}">
                        <option value="" disabled="disabled" selected="selected">-- Select a rating --</option>
                        <option value="5">&#9733;&#9733;&#9733;&#9733;&#9733; Excellent</option>
                        <option value="4">&#9733;&#9733;&#9733;&#9733; Good</option>
                        <option value="3">&#9733;&#9733;&#9733; Average</option>
                        <option value="2">&#9733;&#9733; Poor</option>
                        <option value="1">&#9733; Very Poor</option>
                    </select>
                    <span class="help-block" th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></span>
                </div>

                <div class="form-group" th:classappend="${#fields.hasErrors('message')} ? 'has-error'">
                    <label for="message">Message:</label>
                    <textarea class="form-control" id="message" th:field="*{message}" rows="5"
                              placeholder="Please describe your experience or suggestion..." maxlength="1000"></textarea>
                    <span class="help-block" th:if="${#fields.hasErrors('message')}" th:errors="*{message}"></span>
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <button type="submit" class="btn btn-primary">
                    <i class="fa fa-paper-plane"></i> Submit Feedback
                </button>
                <a th:href="@{/userFront}" class="btn btn-default">
                    <i class="fa fa-arrow-left"></i> Back to Dashboard
                </a>
            </form>
        </div>
    </div>
    <br/>
</div>

<div th:replace="common/header :: body-bottom-scripts"/>
</body>
</html>
